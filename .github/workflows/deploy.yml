# =============================================================
# 自动部署到免费 Cloudflare Workers（不使用Containers容器，无付费）
# 触发：推送到 main 自动上线；也可在 Actions 页面手动 Run workflow。
#
# 前置 Secrets（仓库 Settings → Secrets and variables → Actions）：
#   CLOUDFLARE_API_TOKEN
#   CLOUDFLARE_ACCOUNT_ID
#
# Token最小权限：
# Account > Workers Scripts: Edit
# Account > Workers Routes: Edit
# Zone > DNS: Edit（选中你的域名 timebricks.bid）
# =============================================================
name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Worker 项目依赖
        working-directory: trading_tool
        run: npm install

      - name: 安装 wrangler 稳定3.x版本（纯Workers，无容器付费逻辑）
        run: npm install -g wrangler@3.78.0

      - name: 部署到 Cloudflare Workers
        working-directory: trading_tool
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
