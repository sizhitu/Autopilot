# =============================================================
# Cloudflare Containers 部署配置 —— Autopilot 股票分析工具
# 把 trading_tool/ 下的 Docker 镜像直接跑在 Cloudflare 上，
# 并用自定义域名 timebricks.bid 对外提供服务。
#
# 部署步骤（在本机执行，需要 Node.js + Docker）：
#   1) npm install                 # 安装 @cloudflare/containers
#   2) wrangler login              # 浏览器登录 Cloudflare（账号 sizhitu00@gmail.com）
#   3) wrangler deploy             # 构建并推送镜像、上线 Worker + 容器
#   4) 在 Cloudflare 控制台确认自定义域名 timebricks.bid 已激活
# =============================================================

name = "autopilot"
main = "worker.js"
compatibility_date = "2025-07-01"
workers_dev = false   # 不使用 <subdomain>.workers.dev，仅用自定义域名

# 如需锁定账号，取消注释并填入 Cloudflare 账号 ID（dashboard → 右侧侧栏）
# account_id = "your-account-id"

# ---- 容器定义：直接构建当前目录的 Dockerfile ----
[[containers]]
class_name = "Autopilot"
image = "./Dockerfile"
instance_type = "basic"   # lite(默认)/basic/standard-1..standard-4；basic 给足 CPU 跑 pandas/numpy
max_instances = 3
name = "autopilot-app"

# ---- 把容器作为 Durable Object 绑定给 Worker ----
[[durable_objects.bindings]]
name = "AUTOPILOT"
class_name = "Autopilot"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Autopilot"]

# ---- 自定义域名：timebricks.bid ----
# 前提：timebricks.bid 已在 Cloudflare 账号中添加（添加域名并把 NS 改到 Cloudflare）。
# custom_domain = true 时 Cloudflare 自动管理证书与 DNS，无需手动加解析记录。
[[routes]]
pattern = "timebricks.bid"
custom_domain = true
