# =============================================================
# Cloudflare Workers 免费部署配置 —— Autopilot 股票分析工具
# 移除付费容器模式，改为纯免费 Workers，
# 并用自定义域名 timebricks.bid 对外提供服务。
#
# 部署方式：GitHub Actions 自动部署
# 无需 Docker、无需镜像、无任何付费服务
# =============================================================

name = "autopilot"
main = "worker.js"
compatibility_date = "2025-07-01"
workers_dev = false   # 不使用 <subdomain>.workers.dev，仅用自定义域名

# 如需锁定账号，取消注释并填入 Cloudflare 账号 ID（dashboard → 右侧侧栏）
# account_id = "your-account-id"

# ---- 自定义域名：timebricks.bid ----
# 前提：timebricks.bid 已在 Cloudflare 账号中添加（添加域名并把 NS 改到 Cloudflare）。
# custom_domain = true 时 Cloudflare 自动管理证书与 DNS，无需手动加解析记录。
[[routes]]
pattern = "timebricks.bid/*"
custom_domain = true
